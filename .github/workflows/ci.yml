name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install fastapi uvicorn lightgbm shap \
            pandas numpy scikit-learn lifelines scipy==1.11.4 \
            joblib pyarrow pytest httpx

      - name: Run tests
        run: pytest tests/ -v --tb=short
